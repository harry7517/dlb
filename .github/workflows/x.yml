name: Daily Local Brief Pipeline

on:
  schedule:
    - cron: '30 17 * * *'
    - cron: '30 19 * * *'
    - cron: '0 21 * * *'
    - cron: '30 22 * * *'
    - cron: '30 23 * * *'
    - cron: '30 0 * * *'
    - cron: '30 4 * * *'
    - cron: '30 5 * * *'
    - cron: '30 7 * * *'
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'publish, exchange, calendar, or smoke'
        required: false
        default: publish
        type: choice
        options:
          - publish
          - exchange
          - calendar
          - smoke
      date:
        description: 'Target UTC date (YYYY-MM-DD)'
        required: false
        type: string
      countries:
        description: 'Optional countries override for publish mode'
        required: false
        type: string
      langs:
        description: 'Optional language override for publish or smoke mode'
        required: false
        default: ''
        type: string

concurrency:
  group: dlb-publish-main
  cancel-in-progress: false

jobs:
  publish-briefings:
    name: Publish briefings
    runs-on: ubuntu-latest
    env:
      DEBUG_VERBOSE: "0"
      SUCCESS_TAIL_LINES: "80"
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dlb-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run briefing pipeline
        env:
          X: ${{ secrets.X }}
          Y: ${{ secrets.Y }}
          K1: ${{ secrets.K1 }}
          K2: ${{ secrets.K2 }}
          K3: ${{ secrets.K3 }}
          K6: ${{ secrets.K6 }}
          K7: ${{ secrets.K7 }}
          K8: ${{ secrets.K8 }}
          K9: ${{ secrets.K9 }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_API_VERSION: ${{ secrets.FACEBOOK_API_VERSION }}
          FACEBOOK_DRY_RUN: ${{ secrets.FACEBOOK_DRY_RUN }}
        run: |
          set -euo pipefail

          L="$RUNNER_TEMP/.x"
          mkdir -p "$L"
          C=""
          DEBUG_VERBOSE="${DEBUG_VERBOSE:-0}"
          SUCCESS_TAIL_LINES="${SUCCESS_TAIL_LINES:-80}"

          f() {
            local s="$1"
            local log="$2"
            local last=""
            if [ -f "$log" ]; then
              last="$(tail -n 1 "$log" | sed 's/[[:space:]]\+/ /g' | cut -c1-220)"
            fi
            echo "::error::pipeline:${s}${last:+:${last}}"
            if [ -n "$C" ]; then
              echo "::notice::target_countries=${C}"
            fi
            if [ -f "$log" ]; then
              echo "::group::pipeline:${s}:tail"
              tail -n 20 "$log"
              echo "::endgroup::"
            fi
            exit 1
          }

          show_log() {
            local s="$1"
            local log="$2"
            if [ -f "$log" ]; then
              echo "::group::pipeline:${s}:log"
              tail -n "${SUCCESS_TAIL_LINES}" "$log"
              echo "::endgroup::"
            fi
          }

          show_metrics() {
            local s="$1"
            local log="$2"
            if [ -f "$log" ]; then
              echo "::group::pipeline:${s}:metrics"
              grep -E "Summarizing| via |Embassy notices|Failed to fetch embassy RSS|MOFA|Token budget|Token usage|Section count|Published only|Crawl feeds completed|Stage [12].*(complete|elapsed)|Publish elapsed|Push failed|rebase|CONFLICT|Committed|Pushed|Index refresh|Facebook" "$log" | tail -n 120 || true
              echo "::endgroup::"
            fi
          }

          h() {
            local s="$1"
            shift
            local log="$L/${s}.log"
            local start
            local end
            local status
            start="$(date +%s)"
            echo "::notice::pipeline:start:${s}"
            set +e
            "$@" 2>&1 | tee "$log"
            status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              f "$s" "$log"
            fi
            end="$(date +%s)"
            echo "::notice::pipeline:elapsed:${s}=$((end-start))s"
            show_metrics "$s" "$log"
            if [ "$DEBUG_VERBOSE" = "1" ]; then
              echo "::notice::pipeline:ok:${s}"
              show_log "${s}:ok" "$log"
            fi
          }

          h clone-private-repo git clone -q --depth=1 "https://x-access-token:${Y}@github.com/${X}.git" _work
          cd _work
          h install-python-deps python -u -m pip install -q -r requirements.txt
          git config user.name "harry7517"
          git config user.email "270046768+harry7517@users.noreply.github.com"
          export GEMINI_API_KEY="$K1"
          export GROQ_API_KEY="$K2"
          export NVIDIA_API_KEY="$K3"
          export MOFA_API_KEY="$K6"
          export EXCHANGE_RATE_API_KEY="$K7"
          export CEREBRAS_API_KEY="$K8"
          export MISTRAL_API_KEY="$K9"
          export FACEBOOK_PAGE_ID="${FACEBOOK_PAGE_ID:-1172709562583502}"
          export FACEBOOK_PAGE_ACCESS_TOKEN="${FACEBOOK_PAGE_ACCESS_TOKEN:-}"
          export FACEBOOK_API_VERSION="${FACEBOOK_API_VERSION:-v24.0}"
          export FACEBOOK_DRY_RUN="${FACEBOOK_DRY_RUN:-}"
          export DLB_RUN_MODE=auto
          if [ -n "$K1" ]; then
            echo "::notice::gemini_key=set"
          else
            echo "::warning::gemini_key=missing"
          fi
          if [ -n "$FACEBOOK_PAGE_ACCESS_TOKEN" ]; then
            echo "::notice::facebook_page_token=set"
          else
            echo "::warning::facebook_page_token=missing"
          fi
          export MODEL_PROVIDER_OVERRIDE=google,mistral,nim,cerebras,groq
          export MODEL_OVERRIDE=gemini-2.5-pro
          echo "::notice::providers=${MODEL_PROVIDER_OVERRIDE}"
          
          T="${{ github.event.schedule }}"
          M="$(echo "${{ github.event.inputs.mode }}" | xargs)"
          D="$(echo "${{ github.event.inputs.date }}" | xargs)"
          U="$(echo "${{ github.event.inputs.countries }}" | xargs)"
          G="$(echo "${{ github.event.inputs.langs }}" | xargs)"
          DATE_ARGS=()
          DATE_NOTICE="auto-local"
          if [ -n "$D" ]; then
            DATE_ARGS=(--date "$D")
            DATE_NOTICE="$D"
          fi
          LANG_ARGS=()
          if [ -n "$G" ]; then
            LANG_ARGS=(--langs "$G")
          fi
          echo "::notice::schedule=${T:-manual}"
          echo "::notice::mode=${M:-publish}"
          echo "::notice::date=${DATE_NOTICE}"

          if [ "$M" = "smoke" ]; then
            C="${U:-uae}"
            G="${G:-en}"
            LANG_ARGS=(--langs "$G")
            echo "::notice::target_countries=${C}"
            echo "::notice::target_langs=${G}"
            h crawl python -u -m pipeline.orchestrator --crawl "${DATE_ARGS[@]}" --countries "$C" --skip-side-data
            h smoke-summarize python -u -m pipeline.orchestrator --summarize "${DATE_ARGS[@]}" --countries "$C" "${LANG_ARGS[@]}" --no-publish --no-notify
            exit 0
          fi

          if [ "$M" = "exchange" ]; then
            [ -n "$D" ] || D="$(date -u +%Y-%m-%d)"
            echo "::notice::exchange_date=${D}"
            h exchange python -u -m pipeline.exchange "$D"
            h stage-exchange git add "web/content/${D}/exchange_rates.json"
            if git diff --cached --quiet; then
              echo "::notice::exchange=no_changes"
            else
              h commit-exchange git commit -m "exchange: ${D}"
              h push-exchange git push origin main
            fi
            exit 0
          fi

          if [ "$M" = "calendar" ]; then
            [ -n "$D" ] || D="$(date -u +%Y-%m-%d)"
            echo "::notice::calendar_date=${D}"
            h calendar python -u -m pipeline.holiday_fetcher "$D"
            h stage-calendar git add "web/content/holidays/status/${D}.json" web/content/holidays
            if git diff --cached --quiet; then
              echo "::notice::calendar=no_changes"
            else
              h commit-calendar git commit -m "calendar: ${D}"
              h push-calendar git push origin main
            fi
            exit 0
          fi
          
          # 00:30 UTC일 경우 환율과 달력 데이터를 하루 1회 갱신
          if [ "$(echo "$T" | xargs)" = "30 0 * * *" ]; then
            E="$D"
            [ -n "$E" ] || E="$(date -u +%Y-%m-%d)"
            echo "::notice::exchange_date=${E}"
            echo "::notice::calendar_date=${E}"
            h exchange python -u -m pipeline.exchange "$E"
            h calendar python -u -m pipeline.holiday_fetcher "$E"
            h stage-side-data git add "web/content/${E}/exchange_rates.json" "web/content/holidays/status/${E}.json" web/content/holidays
            if git diff --cached --quiet; then
              echo "::notice::side_data=no_changes"
            else
              h commit-side-data git commit -m "side-data: ${E}"
              h push-side-data git push origin main
            fi
          fi

          if [ -n "$U" ]; then
            C="$U"
          else

            case "$(echo "$T" | xargs)" in
              "30 17 * * *") C="japan,korea" ;;
              "30 19 * * *") C="vietnam,indonesia,thailand" ;;
              "0 21 * * *")  C="india" ;;
              "30 22 * * *") C="uae" ;;
              "30 23 * * *") C="saudi,turkey" ;;
              "30 0 * * *")  C="poland" ;;
              "30 4 * * *")  C="brazil" ;;
              "30 5 * * *")  C="argentina,chile" ;;
              "30 7 * * *")  C="peru" ;;
              "30 8 * * *")  C="mexico" ;;
              *)
                H=$(date -u +%H)
                case "$H" in
                  "17"|"18") C="japan,korea" ;;
                  "19"|"20") C="vietnam,indonesia,thailand" ;;
                  "21")      C="india" ;;
                  "22")      C="uae" ;;
                  "23")      C="saudi,turkey" ;;
                  "00"|"01") C="poland" ;;
                  "04")      C="brazil" ;;
                  "05"|"06") C="argentina,chile" ;;
                  "07")      C="peru" ;;
                  "08"|"09") C="mexico" ;;
                  *)         C="uae" ;;
                esac
                ;;
            esac
          fi
          echo "::notice::target_countries=${C}"
          if [ -n "$G" ]; then
            echo "::notice::target_langs=${G}"
          else
            echo "::notice::target_langs=all configured languages"
          fi
          
          h crawl python -u -m pipeline.orchestrator --crawl "${DATE_ARGS[@]}" --countries "$C" --skip-side-data
          h summarize-and-publish python -u -m pipeline.orchestrator --summarize "${DATE_ARGS[@]}" --countries "$C" "${LANG_ARGS[@]}" --no-notify

      - name: Clean workspace
        if: always()
        run: rm -rf _work >/dev/null 2>&1
