name: x

on:
  schedule:
    - cron: '30 17 * * *'
    - cron: '30 19 * * *'
    - cron: '0 21 * * *'
    - cron: '30 22 * * *'
    - cron: '30 23 * * *'
    - cron: '30 0 * * *'
    - cron: '30 4 * * *'
    - cron: '30 5 * * *'
    - cron: '30 7 * * *'
    - cron: '30 8 * * *'
  workflow_dispatch: {}

jobs:
  j:
    runs-on: ubuntu-latest
    env:
      DEBUG_VERBOSE: "1"
      SUCCESS_TAIL_LINES: "120"
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: r
        env:
          X: ${{ secrets.X }}
          Y: ${{ secrets.Y }}
          K1: ${{ secrets.K1 }}
          K2: ${{ secrets.K2 }}
          K3: ${{ secrets.K3 }}
          K6: ${{ secrets.K6 }}
          K7: ${{ secrets.K7 }}
        run: |
          set -euo pipefail

          L="$RUNNER_TEMP/.x"
          mkdir -p "$L"
          C=""
          DEBUG_VERBOSE="${DEBUG_VERBOSE:-0}"
          SUCCESS_TAIL_LINES="${SUCCESS_TAIL_LINES:-80}"

          f() {
            local s="$1"
            local log="$2"
            local last=""
            if [ -f "$log" ]; then
              last="$(tail -n 1 "$log" | sed 's/[[:space:]]\+/ /g' | cut -c1-220)"
            fi
            echo "::error::x:${s}${last:+:${last}}"
            if [ -n "$C" ]; then
              echo "::notice::x:t=${C}"
            fi
            if [ -f "$log" ]; then
              echo "::group::x:${s}"
              tail -n 20 "$log"
              echo "::endgroup::"
            fi
            exit 1
          }

          show_log() {
            local s="$1"
            local log="$2"
            if [ -f "$log" ]; then
              echo "::group::x:${s}"
              tail -n "${SUCCESS_TAIL_LINES}" "$log"
              echo "::endgroup::"
            fi
          }

          h() {
            local s="$1"
            shift
            local log="$L/${s}.log"
            if ! "$@" >"$log" 2>&1; then
              f "$s" "$log"
            fi
            if [ "$DEBUG_VERBOSE" = "1" ]; then
              echo "::notice::x:ok:${s}"
              show_log "${s}:ok" "$log"
            fi
          }

          h g git clone -q --depth=1 "https://x-access-token:${Y}@github.com/${X}.git" _work
          cd _work
          h p python -m pip install -q -r requirements.txt
          git config user.name "harry7517"
          git config user.email "270046768+harry7517@users.noreply.github.com"
          export GEMINI_API_KEY="$K1"
          export GROQ_API_KEY="$K2"
          export NVIDIA_API_KEY="$K3"
          export MOFA_API_KEY="$K6"
          export EXCHANGE_RATE_API_KEY="$K7"
          export DLB_RUN_MODE=auto
          export MODEL_OVERRIDE=google:gemini-3.1-flash-lite-preview
          
          T="${{ github.event.schedule }}"
          echo "::notice::x:schedule=${T:-manual}"
          
          # 00:30 UTC일 경우 환율 수집 별도 실행
          if [ "$(echo "$T" | xargs)" = "30 0 * * *" ]; then
            h e python pipeline/exchange.py "$(date -u +%Y-%m-%d)"
          fi

          case "$(echo "$T" | xargs)" in
            "30 17 * * *") C="japan,korea" ;;
            "30 19 * * *") C="vietnam,indonesia,thailand" ;;
            "0 21 * * *")  C="india" ;;
            "30 22 * * *") C="uae" ;;
            "30 23 * * *") C="saudi,turkey" ;;
            "30 0 * * *")  C="poland" ;;
            "30 4 * * *")  C="brazil" ;;
            "30 5 * * *")  C="argentina,chile" ;;
            "30 7 * * *")  C="peru" ;;
            "30 8 * * *")  C="mexico" ;;
            *)
              H=$(date -u +%H)
              case "$H" in
                "17"|"18") C="japan,korea" ;;
                "19"|"20") C="vietnam,indonesia,thailand" ;;
                "21")      C="india" ;;
                "22")      C="uae" ;;
                "23")      C="saudi,turkey" ;;
                "00"|"01") C="poland" ;;
                "04")      C="brazil" ;;
                "05"|"06") C="argentina,chile" ;;
                "07")      C="peru" ;;
                "08"|"09") C="mexico" ;;
                *)         C="uae" ;;
              esac
              ;;
          esac
          echo "::notice::x:t=${C}"
          
          h c python pipeline/orchestrator.py --crawl --countries "$C"
          h s python pipeline/orchestrator.py --summarize --countries "$C" --no-notify

      - name: z
        if: always()
        run: rm -rf _work >/dev/null 2>&1
