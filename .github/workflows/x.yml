name: x

on:
  schedule:
    - cron: '30 17 * * *'
    - cron: '30 19 * * *'
    - cron: '0 21 * * *'
    - cron: '30 22 * * *'
    - cron: '30 23 * * *'
    - cron: '30 0 * * *'
    - cron: '30 4 * * *'
    - cron: '30 5 * * *'
    - cron: '30 7 * * *'
    - cron: '30 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'publish, exchange, calendar, or smoke'
        required: false
        default: publish
        type: choice
        options:
          - publish
          - exchange
          - calendar
          - smoke
      date:
        description: 'Target UTC date (YYYY-MM-DD)'
        required: false
        type: string
      countries:
        description: 'Optional countries override for publish mode'
        required: false
        type: string
      langs:
        description: 'Optional language override for smoke mode'
        required: false
        default: en
        type: string

jobs:
  j:
    runs-on: ubuntu-latest
    env:
      DEBUG_VERBOSE: "0"
      SUCCESS_TAIL_LINES: "80"
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-dlb-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: r
        env:
          X: ${{ secrets.X }}
          Y: ${{ secrets.Y }}
          K1: ${{ secrets.K1 }}
          K2: ${{ secrets.K2 }}
          K3: ${{ secrets.K3 }}
          K6: ${{ secrets.K6 }}
          K7: ${{ secrets.K7 }}
          K8: ${{ secrets.K8 }}
          K9: ${{ secrets.K9 }}
        run: |
          set -euo pipefail

          L="$RUNNER_TEMP/.x"
          mkdir -p "$L"
          C=""
          DEBUG_VERBOSE="${DEBUG_VERBOSE:-0}"
          SUCCESS_TAIL_LINES="${SUCCESS_TAIL_LINES:-80}"

          f() {
            local s="$1"
            local log="$2"
            local last=""
            if [ -f "$log" ]; then
              last="$(tail -n 1 "$log" | sed 's/[[:space:]]\+/ /g' | cut -c1-220)"
            fi
            echo "::error::x:${s}${last:+:${last}}"
            if [ -n "$C" ]; then
              echo "::notice::x:t=${C}"
            fi
            if [ -f "$log" ]; then
              echo "::group::x:${s}"
              tail -n 20 "$log"
              echo "::endgroup::"
            fi
            exit 1
          }

          show_log() {
            local s="$1"
            local log="$2"
            if [ -f "$log" ]; then
              echo "::group::x:${s}"
              tail -n "${SUCCESS_TAIL_LINES}" "$log"
              echo "::endgroup::"
            fi
          }

          show_metrics() {
            local s="$1"
            local log="$2"
            if [ -f "$log" ]; then
              echo "::group::x:${s}:metrics"
              grep -E "Embassy notices|Failed to fetch embassy RSS|MOFA|Token budget|Token usage|Section count|Published only|Crawl feeds completed|Stage [12].*(complete|elapsed)|Publish elapsed" "$log" | tail -n 80 || true
              echo "::endgroup::"
            fi
          }

          h() {
            local s="$1"
            shift
            local log="$L/${s}.log"
            local start
            local end
            start="$(date +%s)"
            echo "::notice::x:start:${s}"
            if ! "$@" >"$log" 2>&1; then
              f "$s" "$log"
            fi
            end="$(date +%s)"
            echo "::notice::x:elapsed:${s}=$((end-start))s"
            show_metrics "$s" "$log"
            if [ "$DEBUG_VERBOSE" = "1" ]; then
              echo "::notice::x:ok:${s}"
              show_log "${s}:ok" "$log"
            fi
          }

          h g git clone -q --depth=1 "https://x-access-token:${Y}@github.com/${X}.git" _work
          cd _work
          h p python -m pip install -q -r requirements.txt
          git config user.name "harry7517"
          git config user.email "270046768+harry7517@users.noreply.github.com"
          export GEMINI_API_KEY="$K1"
          export GROQ_API_KEY="$K2"
          export NVIDIA_API_KEY="$K3"
          export MOFA_API_KEY="$K6"
          export EXCHANGE_RATE_API_KEY="$K7"
          export CEREBRAS_API_KEY="$K8"
          export MISTRAL_API_KEY="$K9"
          export DLB_RUN_MODE=auto
          if [ -n "$K1" ]; then
            echo "::notice::x:k1=set"
          else
            echo "::warning::x:k1=missing"
          fi
          export MODEL_PROVIDER_OVERRIDE=google,mistral,nim,cerebras,groq
          export MODEL_OVERRIDE=gemini-2.5-pro
          echo "::notice::x:providers=${MODEL_PROVIDER_OVERRIDE}"
          
          T="${{ github.event.schedule }}"
          M="$(echo "${{ github.event.inputs.mode }}" | xargs)"
          D="$(echo "${{ github.event.inputs.date }}" | xargs)"
          U="$(echo "${{ github.event.inputs.countries }}" | xargs)"
          G="$(echo "${{ github.event.inputs.langs }}" | xargs)"
          DATE_ARGS=()
          DATE_NOTICE="auto-local"
          if [ -n "$D" ]; then
            DATE_ARGS=(--date "$D")
            DATE_NOTICE="$D"
          fi
          echo "::notice::x:schedule=${T:-manual}"
          echo "::notice::x:mode=${M:-publish}"
          echo "::notice::x:date=${DATE_NOTICE}"

          if [ "$M" = "smoke" ]; then
            C="${U:-uae}"
            G="${G:-en}"
            echo "::notice::x:t=${C}"
            echo "::notice::x:langs=${G}"
            h c python -m pipeline.orchestrator --crawl "${DATE_ARGS[@]}" --countries "$C" --skip-side-data
            h s python -m pipeline.orchestrator --summarize "${DATE_ARGS[@]}" --countries "$C" --langs "$G" --no-publish --no-notify
            exit 0
          fi

          if [ "$M" = "exchange" ]; then
            [ -n "$D" ] || D="$(date -u +%Y-%m-%d)"
            echo "::notice::x:exchange_date=${D}"
            h e python -m pipeline.exchange "$D"
            h ga git add "web/content/${D}/exchange_rates.json"
            if git diff --cached --quiet; then
              echo "::notice::x:exchange=no_changes"
            else
              h gc git commit -m "exchange: ${D}"
              h gp git push origin main
            fi
            exit 0
          fi

          if [ "$M" = "calendar" ]; then
            [ -n "$D" ] || D="$(date -u +%Y-%m-%d)"
            echo "::notice::x:calendar_date=${D}"
            h cal python -m pipeline.holiday_fetcher "$D"
            h ca git add "web/content/holidays/status/${D}.json" web/content/holidays
            if git diff --cached --quiet; then
              echo "::notice::x:calendar=no_changes"
            else
              h cc git commit -m "calendar: ${D}"
              h cp git push origin main
            fi
            exit 0
          fi
          
          # 00:30 UTC일 경우 환율과 달력 데이터를 하루 1회 갱신
          if [ "$(echo "$T" | xargs)" = "30 0 * * *" ]; then
            E="$D"
            [ -n "$E" ] || E="$(date -u +%Y-%m-%d)"
            echo "::notice::x:exchange_date=${E}"
            echo "::notice::x:calendar_date=${E}"
            h e python -m pipeline.exchange "$E"
            h cal python -m pipeline.holiday_fetcher "$E"
            h sda git add "web/content/${E}/exchange_rates.json" "web/content/holidays/status/${E}.json" web/content/holidays
            if git diff --cached --quiet; then
              echo "::notice::x:side_data=no_changes"
            else
              h sdc git commit -m "side-data: ${E}"
              h sdp git push origin main
            fi
          fi

          if [ -n "$U" ]; then
            C="$U"
          else

            case "$(echo "$T" | xargs)" in
              "30 17 * * *") C="japan,korea" ;;
              "30 19 * * *") C="vietnam,indonesia,thailand" ;;
              "0 21 * * *")  C="india" ;;
              "30 22 * * *") C="uae" ;;
              "30 23 * * *") C="saudi,turkey" ;;
              "30 0 * * *")  C="poland" ;;
              "30 4 * * *")  C="brazil" ;;
              "30 5 * * *")  C="argentina,chile" ;;
              "30 7 * * *")  C="peru" ;;
              "30 8 * * *")  C="mexico" ;;
              *)
                H=$(date -u +%H)
                case "$H" in
                  "17"|"18") C="japan,korea" ;;
                  "19"|"20") C="vietnam,indonesia,thailand" ;;
                  "21")      C="india" ;;
                  "22")      C="uae" ;;
                  "23")      C="saudi,turkey" ;;
                  "00"|"01") C="poland" ;;
                  "04")      C="brazil" ;;
                  "05"|"06") C="argentina,chile" ;;
                  "07")      C="peru" ;;
                  "08"|"09") C="mexico" ;;
                  *)         C="uae" ;;
                esac
                ;;
            esac
          fi
          echo "::notice::x:t=${C}"
          
          h c python -m pipeline.orchestrator --crawl "${DATE_ARGS[@]}" --countries "$C" --skip-side-data
          h s python -m pipeline.orchestrator --summarize "${DATE_ARGS[@]}" --countries "$C" --no-notify

      - name: z
        if: always()
        run: rm -rf _work >/dev/null 2>&1
